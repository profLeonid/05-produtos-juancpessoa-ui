<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./main.js" defer></script>

    <title>Produtos</title>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center h-screen gap-">
   
    <h1 class="text-3xl">Lista de produtos</h1>
    <h2 class="text-1xl m-3"> Digite Codigo, produto e valor</h2>
    
    <input 
    type="text" 
    class=" border rounded px-8 py-2"
    placeholder=" Produto"
    id="produto"
    >
    <input 
    type="number" 
    class=" border rounded px-8 py-2"
    placeholder=" Códico"
    id="codigo"
    >
    <input 
    type="text" 
    class=" border rounded px-8 py-2"
    placeholder=" Quantidade"
    id="quantidade"
    >
    
    <button 
    class="bg-blue-400 border rounded text-white px-4 m-3 " 
    onclick="adicionarProduto()">
    Adicionar
    </button>

   
    <button class="bg-blue-400 border rounded text-white px-4 m-3" 
    onclick="limparProduto()"> 
        limpa
        
    </button>

    <div id="lista" class="flex flex-col gap-2" >
        <table id= 'tabela' class=" border-separate border-spacing-y-1">

            <thead> 
                <tr class= "text-left">
                    <th class="px-4 py-2">Código</th>
                    <th class="px-4 py-2">Produto</th>
                    <th class="px-4 py-2">Quantidade</th>
                </tr>
            </thead>

            <tbody id="atributos"></tbody>

        </table>
    </div>

</body>
</html>
